{% extends "base.html" %}

{% block title %}{{ t.chairs_page_title }}{% endblock %}

{% block content %}
<div class="container page-back-link-wrap">
  <a class="chip back-chip" href="{{ url_for('home', lang=lang) }}">
    ← {{ t.back_home }}
  </a>
</div>
<section class="content-section">
  <div class="container">

    <div class="section-heading">
      <h2>{{ t.chairs_page_title }}</h2>
      <p>{{ t.chairs_page_text }}</p>
    </div>

    <div class="chair-list">
      {% for chair in chairs %}
        <a class="chair-list-item"
           href="{{ url_for('lehrstuhl_detail', chair_id=chair.id, lang=lang) }}">
           
          <div class="chair-list-name">
            {{ chair.name }}
          </div>

          <div class="chair-list-meta">
            {{ chair.modules_count }} Module →
          </div>

        </a>
      {% endfor %}
    </div>

  </div>
</section>
{% endblock %}
