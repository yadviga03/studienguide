{% extends "base.html" %}
{% block content %}

<div class="container">

  <h2>{{ chair.name }}</h2>

  <h3 style="margin-top:30px;">Module</h3>

  {% if modules %}
    <div class="module-list">
      {% for m in modules %}
        <div class="module-card">
          <summary>{{ m.name }}</summary>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <p>Noch keine Module eingetragen.</p>
  {% endif %}

</div>

{% endblock %}
